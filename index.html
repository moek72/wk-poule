<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#160202">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Club 2000">
  
  <title>Familie Club 2000 - familie arcade</title>
  
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/icons/favicon-16.png">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bungee&family=VT323&family=Audiowide&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="src/style.css">
</head>
<body>
  <div id="app">
    <div class="loading">
      <div class="loading-text">FAMILIE CLUB 2000<br>laden...</div>
    </div>
  </div>
  
  <script type="module" src="src/main.js"></script>
  
  <!-- Service Worker registratie -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => {
            if (reg) console.log('SW registered:', reg.scope);
          })
          .catch(err => console.error('SW failed:', err));
      });
    }
  </script>
</body>
</html>
