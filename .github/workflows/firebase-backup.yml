name: Firebase Database Backup

on:
  schedule:
    - cron: '0 22 * * *'   # elke nacht 00:00 Amsterdam tijd (UTC+2)
  workflow_dispatch:         # ook handmatig te starten via GitHub Actions tab

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Export Firebase database
        run: |
          DATE=$(date -u +"%Y-%m-%d")
          mkdir -p backups
          curl -s "https://wk-2026-poule-867ae-default-rtdb.europe-west1.firebasedatabase.app/v.json?auth=${{ secrets.FIREBASE_DB_SECRET }}" \
            -o "backups/backup-${DATE}.json"
          echo "Backup saved: backups/backup-${DATE}.json"
          wc -c "backups/backup-${DATE}.json"

      - name: Commit backup
        run: |
          DATE=$(date -u +"%Y-%m-%d")
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backups/
          if git diff --staged --quiet; then
            echo "Geen wijzigingen — backup al up-to-date"
          else
            git commit -m "backup: automatische Firebase export ${DATE}"
            git push
          fi
